version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2  # cache Maven dependencies
    command: mvn spring-boot:run
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pass123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      #NEXT_PUBLIC_API_BASE_URL: http://backend:8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 1000   # Poll every 1s for changes (needed on Windows/macOS)
    command: npm run dev
    ports:
      - "3000:3000"


  postgres:
    image: postgres:14
    container_name: postgres-portfolio
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
